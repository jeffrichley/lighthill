name: ci

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # Test the supported-Python floor + current. lighthill targets
        # >=3.10 (Isaac Sim compatibility); 3.12 is the dev default.
        python-version: ["3.10", "3.12"]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4
      - run: uv sync --locked
      - run: just check
      # Patch-coverage gate. ``just check`` writes coverage.xml via pytest-cov
      # (configured in pyproject addopts). diff-cover compares the diff against
      # the PR base and fails if patch coverage falls below 80%. PR-only —
      # push/merge_group have no base ref to diff against.
      - name: Patch coverage gate (diff-cover)
        if: github.event_name == 'pull_request'
        run: uv run --no-sync diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=80
      - run: uv cache prune --ci
